services:
  - type: web
    name: n8n
    runtime: image
    repo: https://github.com/eonidsanarov2000/n8n-render-ok
    plan: free
    envVars:
      - key: N8N_PORT
        value: 5678
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://n8n.onrender.com
      - key: N8N_BASIC_AUTH_ACTIVE
        value: 'true'
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        value: твой_пароль
      - key: N8N_ENCRYPTION_KEY
        value: сгенерируй_строку
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
